<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bài viết - Journally</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/posts.css">
      <link rel="stylesheet" href="../css/components.css">
  </head>
  <body>

    <header>
      <div id="header-container"></div>
    </header>

    <main>

      <div class="background"></div>

      <!-- Bài viết chính -->
      <article>
        <div id="post-container"></div>
      </article>
    
      <form class="comment-input" role="form" aria-label="Comment form">
            <div class="div-wrapper">
              <label for="comment-textarea" class="visually-hidden">Viết bình luận</label>
              <textarea
                id="comment-textarea"
                class="text-wrapper"
                placeholder="Viết bình luận..."
                aria-label="Viết bình luận"
                rows="3"
              ></textarea>
            </div>
            <button type="submit" class="post-comment" id="post-comment" aria-label="Đăng bình luận">
              <span class="div">Đăng</span>
            </button>
          </form>

      <!-- bình luận -->
      <article>
        <div id="comment-container"></div>
      </article>

      <!-- Menu -->
      <nav class="menu" aria-label="Main navigation">
        <button class="home-button" aria-label="Home">
          <img src="../assets/image/home button.png" alt="">
        </button>
        <button class="profile" aria-label="Profile">
          <img class="ellipse-3" src="../assets/image/profile.png" alt="" />
        </button>
        <button class="notification-button" aria-label="Notifications">
          <img class="star" src="../assets/image/notification.png" alt="" />
        </button>
        <button class="create-post" aria-label="Create new post">
          <img class="plus-2" src="../assets/image/create post.png" alt="" />
        </button>
      </nav>
    </main>
    

    <script type="module">
      import { loadAllComponents } from "../javascript/components.js";
      loadAllComponents();
    </script>

    <script type="module" src="../javascript/comment.js"></script>
    <script type="module" src="../javascript/posts.js"></script>
    <script type="module" src="../javascript/createComponents.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
